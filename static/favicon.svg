<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <rect width="32" height="32" rx="4" fill="#1a1a2e"/>
  <!-- Vault body -->
  <rect x="4" y="6" width="24" height="22" rx="2" fill="none" stroke="#00ff88" stroke-width="2"/>
  <!-- Vault door circle -->
  <circle cx="16" cy="17" r="7" fill="none" stroke="#00ff88" stroke-width="1.5"/>
  <!-- Vault handle/dial -->
  <circle cx="16" cy="17" r="2.5" fill="#00ff88"/>
  <!-- Handle spokes -->
  <line x1="16" y1="10" x2="16" y2="13" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="16" y1="21" x2="16" y2="24" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="9" y1="17" x2="12" y2="17" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="20" y1="17" x2="23" y2="17" stroke="#00ff88" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Hinges -->
  <rect x="3" y="10" width="2" height="3" rx="0.5" fill="#00ff88"/>
  <rect x="3" y="21" width="2" height="3" rx="0.5" fill="#00ff88"/>
  <!-- Lock indicator -->
  <rect x="12" y="3" width="8" height="4" rx="1" fill="#00ff88" opacity="0.3"/>
  <circle cx="16" cy="5" r="1" fill="#00ff88"/>
</svg>
